name: Publish packages

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@kodes-tech'

      # --legacy-peer-deps: mesmo motivo do ci.yml (react-native-web@0.19 pede React 18)
      - run: npm ci --legacy-peer-deps

      - run: npm run build --workspaces --if-present

      # @kodes-tech/icons NÃO entra neste trem: tem release próprio por tag
      # icons-vX.Y.Z (ver publish-icons.yml). Só garanta que a versão de icons
      # que o ui-native pede (dependencies) já esteja publicada.
      - name: Publish @kodes-tech/tokens
        run: npm publish --workspace packages/tokens
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @kodes-tech/ui-native
        run: npm publish --workspace packages/ui-native
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
