# Template nginx para servir o Storybook estático no Cloud Run.
#
# O entrypoint da imagem oficial nginx roda `envsubst` nos arquivos
# `/etc/nginx/templates/*.template`, substituindo SÓ as variáveis presentes no
# ambiente (as demais, como `$uri`, ficam intactas). Por isso `${PORT}` vira a
# porta injetada pelo Cloud Run e `$uri` continua sendo variável do nginx.
server {
    listen       ${PORT};
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Health check do Cloud Run (bate direto no container, antes do IAP).
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Assets com hash no nome → cache longo e imutável.
    location ~* \.(?:js|css|woff2?|ttf|eot|png|jpe?g|gif|svg|ico|json|map)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # index.html aponta para os assets com hash da build atual → nunca cachear.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
